name: CI  # 2026-03-16 07:25

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'doc/**'
  workflow_dispatch:
    inputs:
      koreforge_version:
        description: 'KoreForge sibling package version on NuGet.org (e.g. 1.0.0). Leave blank to build from source.'
        required: false
        default: ''

# Exposed as an MSBuild property via Directory.Packages.props $(KoreForgeVersion).
# Set by workflow_dispatch input; empty for push/PR triggers (build from source).
env:
  KOREFORGE_VERSION: ${{ inputs.koreforge_version || '' }}

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Integration tests use Testcontainers to spin up their own Confluent Kafka container.
    # Docker is available by default on ubuntu-latest; no extra service needed.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # MinVer needs full history for tag-based versioning

      - name: Checkout KoreForge.Time (dependency)
        uses: actions/checkout@v4
        with:
          repository: koreforger/KoreForge.Time
          path: dep/KoreForge.Time
          fetch-depth: 0

      - name: Checkout KoreForge.Metrics (dependency)
        uses: actions/checkout@v4
        with:
          repository: koreforger/KoreForge.Metrics
          path: dep/KoreForge.Metrics
          fetch-depth: 0

      - name: Checkout KoreForge.Logging (dependency)
        uses: actions/checkout@v4
        with:
          repository: koreforger/KoreForge.Logging
          path: dep/KoreForge.Logging
          fetch-depth: 0

      - name: Checkout KoreForge.Processing (dependency)
        uses: actions/checkout@v4
        with:
          repository: koreforger/KoreForge.Processing
          path: dep/KoreForge.Processing
          fetch-depth: 0

      - name: Link dependencies as siblings
        run: |
          ln -s "${{ github.workspace }}/dep/KoreForge.Time"       "${{ github.workspace }}/../KoreForge.Time"
          ln -s "${{ github.workspace }}/dep/KoreForge.Metrics"    "${{ github.workspace }}/../KoreForge.Metrics"
          ln -s "${{ github.workspace }}/dep/KoreForge.Logging"    "${{ github.workspace }}/../KoreForge.Logging"
          ln -s "${{ github.workspace }}/dep/KoreForge.Processing" "${{ github.workspace }}/../KoreForge.Processing"
          # Block Kafka's NuGet.config from propagating into sibling builds:
          # its local artifact sources don't exist yet when the deps are being built.
          cat > dep/NuGet.config << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" protocolVersion="3" />
            </packageSources>
          </configuration>
          EOF

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build KoreForge.Time (dependency)
        if: env.KOREFORGE_VERSION == ''
        run: |
          dotnet build dep/KoreForge.Time/KoreForge.Time.sln -c Release
          dotnet pack  dep/KoreForge.Time/KoreForge.Time.sln -c Release --no-build

      - name: Build KoreForge.Metrics (dependency)
        if: env.KOREFORGE_VERSION == ''
        run: |
          dotnet build dep/KoreForge.Metrics/KoreForge.Metrics.sln -c Release
          dotnet pack  dep/KoreForge.Metrics/KoreForge.Metrics.sln -c Release --no-build

      - name: Build KoreForge.Logging (dependency)
        if: env.KOREFORGE_VERSION == ''
        run: |
          dotnet build dep/KoreForge.Logging/KoreForge.Logging.sln -c Release
          dotnet pack  dep/KoreForge.Logging/KoreForge.Logging.sln -c Release --no-build

      - name: Build KoreForge.Processing (dependency)
        if: env.KOREFORGE_VERSION == ''
        run: |
          dotnet build dep/KoreForge.Processing/KoreForge.Processing.sln -c Release
          dotnet pack  dep/KoreForge.Processing/KoreForge.Processing.sln -c Release --no-build

      - name: Restore
        run: dotnet restore KoreForge.Kafka.sln

      - name: Build
        run: dotnet build KoreForge.Kafka.sln -c Release --no-restore

      - name: Run unit tests (exclude integration)
        run: |
          dotnet test KoreForge.Kafka.sln -c Release --no-build \
            --filter "FullyQualifiedName!~IntegrationTests" \
            --logger "trx;LogFileName=UnitTestResults.trx" \
            --results-directory ./out/TestResults \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings

      - name: Run integration tests (Testcontainers manages Kafka lifecycle)
        run: |
          dotnet test KoreForge.Kafka.sln -c Release --no-build \
            --filter "FullyQualifiedName~IntegrationTests" \
            --logger "trx;LogFileName=IntegrationTestResults.trx" \
            --results-directory ./out/TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: out/TestResults/**/*.trx

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: out/TestResults/**/coverage.cobertura.xml
